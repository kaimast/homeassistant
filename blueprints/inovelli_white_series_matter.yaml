            event_data:
              controller: "{{ controller_id }}"
              action: down_single

      - conditions:
          - condition: trigger
            id: down_double
        sequence:
          - event: ahb_controller_event
            event_data:
              controller: "{{ controller_id }}"
              action: down_double

      - conditions:
          - condition: trigger
            id: down_triple
        sequence:
          - event: ahb_controller_event
            event_data:
              controller: "{{ controller_id }}"
              action: down_triple

      - conditions:
          - condition: trigger
            id: down_quadruple
        sequence:
          - event: ahb_controller_event
            event_data:
              controller: "{{ controller_id }}"
              action: down_quadruple

      - conditions:
          - condition: trigger
            id: down_quintuple
        sequence:
          - event: ahb_controller_event
            event_data:
              controller: "{{ controller_id }}"
              action: down_quintuple

      - conditions:
          - condition: trigger
            id: down_held
        sequence:
